<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0B0F14">
<link rel="icon" href="../favicon.svg">
<title>Mantenimiento guiado (AR) · Factiun</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>
<style>
  :root{--void:#0B0F14;--text:#E7EEF4;--muted:#8093A4;--bg:var(--void);--card:#0F151D;--card2:#15212d;--line:#23303D;--line2:#32485d;
    --tx:var(--text);--tx2:var(--muted);--tx3:#5e7388;--accent:#36D399;--ok:#37b87c;--warn:#e0a52b;--danger:#e2574c;
    --mono:'IBM Plex Mono',ui-monospace,monospace;--sans:'IBM Plex Sans',system-ui,sans-serif;--display:'Space Grotesk',var(--sans);}
  *{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--tx);font-family:var(--sans);user-select:none;-webkit-user-select:none;display:flex;flex-direction:column;height:100vh}
  .bar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#0a121a;border-bottom:1px solid var(--line);flex:none}
  .bar .b{font:700 14px var(--display);color:var(--accent)}
  .bar .t{font:600 14px var(--sans)}.bar .s{color:var(--tx3);font-size:12px;margin-left:auto}
  .bar a{color:var(--tx2);text-decoration:none;font-size:12px;border:1px solid var(--line);border-radius:9px;padding:6px 10px}
  .stage{flex:1;position:relative;min-height:0}
  model-viewer{width:100%;height:100%;background:radial-gradient(120% 90% at 50% 10%,#16263a,#0b0f14);--poster-color:transparent}
  .arbtn{position:absolute;top:12px;right:12px;background:var(--accent);color:#06210f;border:0;border-radius:11px;padding:11px 16px;font:700 14px var(--sans);cursor:pointer;z-index:5}
  .note{position:absolute;top:12px;left:12px;background:rgba(13,19,26,.8);border:1px solid var(--line);border-radius:9px;padding:7px 11px;font-size:11.5px;color:var(--tx2);max-width:60%}
  .dock{flex:none;background:var(--card);border-top:1px solid var(--line);padding:14px 16px}
  .prog{height:6px;background:#1b2735;border-radius:4px;overflow:hidden;margin-bottom:12px}
  .prog .f{height:100%;width:0;background:var(--accent);transition:width .25s}
  .step{display:flex;align-items:flex-start;gap:13px}
  .num{width:40px;height:40px;border-radius:11px;background:var(--card2);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font:700 17px var(--mono);color:var(--accent);flex:none}
  .stxt{flex:1}.stxt h3{margin:0 0 4px;font:700 17px var(--display)}.stxt p{margin:0;color:var(--tx2);font-size:13.5px;line-height:1.5}
  .nav{display:flex;gap:9px;margin-top:13px}
  .nav button{border-radius:11px;padding:12px 16px;font:600 15px var(--sans);cursor:pointer;border:1px solid var(--line2);background:var(--card2);color:var(--tx)}
  .nav .prev{flex:none}.nav .done{flex:1;background:var(--ok);color:#04140c;border:0}.nav .next{flex:1;background:var(--accent);color:#06210f;border:0}
  .tag{display:inline-block;margin-bottom:8px;font:600 10.5px var(--sans);text-transform:uppercase;letter-spacing:.05em;color:var(--warn);border:1px solid var(--warn);border-radius:999px;padding:3px 9px}
</style>
</head>
<body>
  <div class="bar"><span class="b">🛠️ Mantenimiento guiado</span><span class="t">TCU SUNNER</span><span class="s">AR en Android · 3D en todos</span><a href="index.html">← Arena</a></div>
  <div class="stage">
    <model-viewer id="mv"
      src="https://cdn.jsdelivr.net/gh/IMoriana3/gemelo-digital@main/tcu.glb"
      alt="Unidad de control TCU"
      camera-controls touch-action="pan-y" auto-rotate rotation-per-second="18deg"
      shadow-intensity="1" exposure="1.05" environment-image="neutral"
      ar ar-modes="webxr scene-viewer" ar-scale="auto" ar-placement="floor">
      <button slot="ar-button" class="arbtn">📱 Ver en RA</button>
      <div class="note" id="note">Cargando CAD real de la TCU…</div>
    </model-viewer>
  </div>
  <div class="dock">
    <div class="prog"><div class="f" id="prog"></div></div>
    <div class="step">
      <div class="num" id="sNum">1</div>
      <div class="stxt"><span class="tag" id="sTag" style="display:none">Seguridad</span><h3 id="sTitle"></h3><p id="sText"></p></div>
    </div>
    <div class="nav">
      <button class="prev" id="btnPrev">←</button>
      <button class="done" id="btnDone">✓ Hecho</button>
      <button class="next" id="btnNext">Siguiente →</button>
    </div>
  </div>

<script>
(function(){
  var el=function(id){return document.getElementById(id);};
  var STEPS=[
    {tag:'Seguridad', t:'Bloqueo y ausencia de tensión (LOTO)', d:'Antes de tocar nada: pon el seguidor en posición de mantenimiento, desconecta y verifica ausencia de tensión. Recuerda que el string FV genera tensión con luz. Bloqueo y etiquetado.'},
    {t:'Inspección visual de la TCU', d:'Revisa la carcasa, la tapa, los prensaestopas y que no haya entrada de agua ni corrosión. Comprueba la fijación de la unidad a la viga (chapas y abarcones).'},
    {t:'Conexiones PV± y RS485', d:'Verifica el apriete y el estado de los conectores PV+ / PV− y del bus RS485. Sin holguras ni óxido. Reaprieta según par especificado.'},
    {t:'Batería y fusibles', d:'Comprueba la tensión / estado de carga (SoC) de la batería y el portafusibles. Una batería baja deja al seguidor sin poder moverse.'},
    {t:'Accionamiento (motor / slew)', d:'Escucha el motor y revisa el slew drive: sin ruidos anómalos ni sobrecorriente. Comprueba el par de apriete de los abarcones que sujetan la viga de torsión.'},
    {tag:'Clave antes de viento', t:'Amortiguadores', d:'Revisa holguras y fijación de los amortiguadores. Un amortiguador roto provoca daño estructural con viento: corrígelo antes de cualquier episodio de viento fuerte.'},
    {t:'Módulos y alarmas', d:'Inspecciona suciedad/soiling y daños en módulos. Revisa las alarmas activas del tracker en el SCADA y resuélvelas o registra incidencia.'},
    {t:'Cierre y vuelta a AUTO', d:'Retira el bloqueo, devuelve el seguidor a modo AUTO y verifica en el SCADA que vuelve a seguir al sol correctamente y sin alarmas.'}
  ];
  var i=0, done=[];
  function render(){
    var s=STEPS[i];
    el('sNum').textContent=(i+1);
    el('sTitle').textContent=s.t; el('sText').textContent=s.d;
    var tag=el('sTag'); if(s.tag){tag.style.display='';tag.textContent=s.tag;}else tag.style.display='none';
    el('prog').style.width=((i)/(STEPS.length-1)*100)+'%';
    el('btnPrev').disabled=(i===0); el('btnPrev').style.opacity=i===0?.4:1;
    el('btnNext').textContent=(i>=STEPS.length-1)?'Reiniciar ↺':'Siguiente →';
    el('btnDone').textContent=done[i]?'✓ Hecho':'Marcar hecho';
    el('btnDone').style.opacity=done[i]?1:.85;
  }
  el('btnPrev').onclick=function(){ if(i>0){i--;render();} };
  el('btnNext').onclick=function(){ if(i>=STEPS.length-1){i=0;done=[];} else i++; render(); };
  el('btnDone').onclick=function(){ done[i]=!done[i]; if(done[i]&&i<STEPS.length-1){i++;} render(); };
  var mv=el('mv');
  mv.addEventListener('load',function(){ el('note').style.display='none'; });
  mv.addEventListener('error',function(){ el('note').textContent='No se pudo cargar el CAD (revisa la conexión).'; });
  render();
})();
</script>
</body>
</html>
