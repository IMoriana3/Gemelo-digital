<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0B0F14">
<link rel="icon" href="../favicon.svg">
<title>Tracker en Realidad Aumentada · Factiun</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- extras r128: cielo físico, IBL y post-proceso (bloom + SMAA) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/objects/Sky.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/environments/RoomEnvironment.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/SMAAPass.js"></script>
<script src="../seguidor.js?v=7"></script>
<script src="escena.js"></script>
<style>
  :root{--void:#0B0F14;--text:#E7EEF4;--muted:#8093A4;--line:#23303D;--line2:#32485d;--card2:#15212d;
    --tx:var(--text);--tx2:var(--muted);--tx3:#5e7388;--accent:#36D399;--sans:'IBM Plex Sans',system-ui,sans-serif;--display:'Space Grotesk',var(--sans);}
  *{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden}
  body{background:#0B0F14;color:var(--tx);font-family:var(--sans);user-select:none;-webkit-user-select:none}
  #cv{position:fixed;inset:0}#cv canvas{display:block;width:100%;height:100%}
  .bar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:10px;padding:10px 14px;z-index:10;
    background:linear-gradient(180deg,rgba(11,15,20,.7),transparent)}
  .bar .b{font:700 14px var(--display);color:var(--accent)}.bar .t{font:600 13px var(--sans);color:var(--tx2)}
  .bar a{margin-left:auto;color:var(--tx2);text-decoration:none;font-size:12px;border:1px solid var(--line2);border-radius:9px;padding:6px 10px;background:rgba(13,19,26,.6)}
  .arbtn{position:fixed;bottom:18px;left:50%;translate:-50% 0;z-index:10;background:var(--accent);color:#06210f;border:0;border-radius:14px;padding:15px 26px;font:700 17px var(--display);cursor:pointer;box-shadow:0 8px 28px rgba(54,211,153,.35)}
  .arnote{position:fixed;bottom:78px;left:50%;translate:-50% 0;z-index:10;max-width:90%;text-align:center;color:var(--tx2);font-size:12.5px;background:rgba(13,19,26,.7);border:1px solid var(--line);border-radius:10px;padding:8px 12px}
  .hint{position:fixed;top:50px;left:50%;translate:-50% 0;color:var(--tx2);font-size:12px;z-index:9;text-shadow:0 1px 3px #000}
  /* overlay DOM durante la sesión RA */
  .aroverlay{position:fixed;inset:0;z-index:50;display:none;pointer-events:none}
  .aroverlay.show{display:block}
  .aroverlay .arhint{position:absolute;top:16px;left:50%;translate:-50% 0;background:rgba(13,19,26,.85);border:1px solid var(--line2);border-radius:12px;padding:10px 16px;font-size:14px;pointer-events:none;max-width:90%;text-align:center}
  .aroverlay .arexit{position:absolute;bottom:24px;left:50%;translate:-50% 0;background:#e2574c;color:#fff;border:0;border-radius:12px;padding:13px 22px;font:700 15px var(--sans);cursor:pointer;pointer-events:auto}
</style>
</head>
<body>
  <div id="cv"></div>
  <div class="bar"><span class="b">📱 Tracker AR</span><span class="t">Seguidor 1V · Factiun</span><a href="index.html">← Arena</a></div>
  <div class="hint">Arrastra para girar · pellizca para zoom · el sol cruza el cielo</div>
  <div class="arnote" id="arnote"></div>
  <button class="arbtn" id="arbtn" style="display:none">📱 Ver en tu espacio (RA)</button>

  <div class="aroverlay" id="aroverlay">
    <div class="arhint" id="arhint"></div>
    <button class="arexit" id="arexit">✕ Salir de RA</button>
  </div>

  <script src="trackerar.js"></script>
</body>
</html>
